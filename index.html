<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col">

  <!-- Navbar -->
  <div class="flex flex-wrap gap-2 p-4 bg-gray-800">
    <div id="weeks" class="flex flex-wrap gap-2"></div>
    <div class="ml-auto text-sm" id="score">0/0 correct</div>
  </div>

  <!-- Progress -->
  <div class="px-4 py-2 bg-gray-700">
    <div id="progressText">Week 1 - Q1 of 10</div>
    <div class="w-full bg-gray-600 h-2 mt-2 rounded">
      <div id="progressBar" class="bg-green-400 h-2 rounded" style="width:0%"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="flex-1 flex flex-col items-center justify-center p-6">
    <div id="quizBox" class="w-full max-w-xl">

      <h2 id="question" class="text-xl mb-6"></h2>

      <div id="options" class="grid gap-3"></div>

      <div class="flex justify-between mt-6">
        <button onclick="prevQ()" class="px-4 py-2 bg-gray-700 rounded">Prev</button>
        <button onclick="nextQ()" class="px-4 py-2 bg-blue-500 rounded">Next</button>
      </div>

      <button onclick="restartQuiz()" class="mt-4 w-full bg-red-500 py-2 rounded">
        Restart
      </button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
